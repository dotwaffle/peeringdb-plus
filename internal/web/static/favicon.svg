  </g>
  <line x1="13" y1="16" x2="19" y2="16" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="16" y1="11" x2="16" y2="21" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
</svg>
