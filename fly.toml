# Fly.io deployment configuration for PeeringDB Plus
# Deploy with: fly deploy (per D-22, manual deploy)

app = "peeringdb-plus"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile.prod"

[env]
  # App listens on 8081 (behind LiteFS proxy on 8080)
  PDBPLUS_LISTEN_ADDR = ":8081"
  # Database path on LiteFS FUSE mount
  PDBPLUS_DB_PATH = "/litefs/peeringdb-plus.db"
  # Primary region for LiteFS lease candidate evaluation
  PRIMARY_REGION = "iad"

# Persistent volume for LiteFS replication state per D-21
[[mounts]]
  source = "litefs_data"
  destination = "/var/lib/litefs"

# HTTP service configuration
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  # Liveness health check (process alive)
  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

# Machine size per D-16
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
