# Fly.io deployment configuration for PeeringDB Plus
# Deploy with: fly deploy (per D-22, manual deploy)

app = "peeringdb-plus"
primary_region = "lhr"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile.prod"

[deploy]
  strategy = "rolling"
  # Parallelise rolling deploys to ~4-at-a-time (half the 9-machine fleet).
  # Trades ~55% worst-moment capacity for ~3-4x faster rollouts.
  # Bluegreen is NOT an option here: parallel fleets fight LiteFS +
  # Consul primary election.
  max_unavailable = 0.5

[env]
  # App listens on 8080 directly (LiteFS proxy removed for h2c/gRPC support)
  PDBPLUS_LISTEN_ADDR = ":8080"
  # Database path on LiteFS FUSE mount
  PDBPLUS_DB_PATH = "/litefs/peeringdb-plus.db"
  # Primary region for LiteFS lease candidate evaluation
  PRIMARY_REGION = "lhr"

# Consul is required for LiteFS leader election.
[consul]
  enable = true

# Persistent volume for LiteFS replication state
[mounts]
  source = "litefs_data"
  destination = "/var/lib/litefs"
  initial_size = "1GB"
  scheduled_snapshots = false
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1G"
  auto_extend_size_limit = "10G"

# HTTP service configuration
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.http_options]
    h2_backend = true

  [http_service.concurrency]
    type = "requests"
    soft_limit = 10

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

# Machine size
[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"
