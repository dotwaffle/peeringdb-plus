# Fly.io deployment configuration for PeeringDB Plus
# Deploy with: fly deploy (per D-22, manual deploy)

app = "peeringdb-plus"
primary_region = "lhr"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile.prod"

[deploy]
  strategy = "rolling"
  max_unavailable = 1

[env]
  # App listens on 8081 (behind LiteFS proxy on 8080)
  PDBPLUS_LISTEN_ADDR = ":8081"
  # Database path on LiteFS FUSE mount
  PDBPLUS_DB_PATH = "/litefs/peeringdb-plus.db"
  # Primary region for LiteFS lease candidate evaluation
  PRIMARY_REGION = "lhr"

# Consul is required for LiteFS leader election.
[consul]
  enable = true

# Persistent volume for LiteFS replication state
[mounts]
  source = "litefs_data"
  destination = "/var/lib/litefs"
  initial_size = "1GB"
  scheduled_snapshots = false
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1G"
  auto_extend_size_limit = "10G"

# HTTP service configuration
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 10

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

# Machine size
[[vm]]
  size = "performance-1x"
  memory = "2048mb"
