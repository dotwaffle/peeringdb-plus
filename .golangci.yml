version: "2"

linters:
  default: standard
  enable:
    - contextcheck
    - exhaustive
    - gocritic
    - gosec
    - misspell
    - modernize
    - nolintlint
    - revive
  exclusions:
    generated: strict
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
      - path: cmd/pdb-schema-(extract|generate)/
        linters:
          - gosec
      - path: cmd/pdbcompat-check/
        linters:
          - gosec
