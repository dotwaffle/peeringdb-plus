version: "2"

linters:
  default: standard
  enable:
    - contextcheck
    - exhaustive
    - gocritic
    - gosec
    - misspell
    - modernize
    - nolintlint
    - revive
  exclusions:
    generated: strict
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
      - path: cmd/pdb-schema-(extract|generate)/
        linters:
          - gosec
      - path: cmd/pdbcompat-check/
        linters:
          - gosec

formatters:
  # gofmt with simplify (-s) enforced 2026-04-28: catches unnecessary
  # syntactic constructs (e.g. `s[a:len(s)]` → `s[a:]`, `for _, x := range
  # arr` simplifications, redundant literal types). modernize linter
  # (above) catches semantic-level Go-idiom drift; gofmt -s catches the
  # syntactic-level drift on the same axis.
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
