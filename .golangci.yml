version: "2"

linters:
  default: standard
  enable:
    - contextcheck
    - exhaustive
    - gocritic
    - gosec
    - misspell
    - nolintlint
    - revive
  exclusions:
    generated: strict
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
