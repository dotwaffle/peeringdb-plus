schema:
  - schema.graphqls
  - custom.graphql

exec:
  filename: generated.go
  package: graph

resolver:
  layout: follow-schema
  dir: .
  package: graph

autobind:
  - github.com/dotwaffle/peeringdb-plus/ent
  - github.com/dotwaffle/peeringdb-plus/ent/schema
  - github.com/dotwaffle/peeringdb-plus/ent/schematypes
  - github.com/dotwaffle/peeringdb-plus/graph/model

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.IntID
  Node:
    model:
      - github.com/dotwaffle/peeringdb-plus/ent.Noder
  # Phase 64 (VIS-08/VIS-09): field-level privacy via custom resolver.
  # The autobind above maps IxLan → *ent.IxLan; we opt-in one field
  # to have a user-written resolver so it can call
  # internal/privfield.Redact against the caller's ctx tier. See
  # graph/custom.resolvers.go for the implementation.
  IxLan:
    fields:
      ixfIxpMemberListURL:
        resolver: true
