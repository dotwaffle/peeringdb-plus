name: CI

# A single `ci` job runs generation, build, race tests, lint, and
# govulncheck in order against one Go cache. Mise supplies every tool from
# the committed manifest and lockfile, so local and CI versions cannot drift.
#
# `docker-build` stays a separate parallel job: it uses BuildKit's
# `type=gha` cache (a different cache system from the Go build cache), so
# folding it into the Go job would only serialise it onto the critical
# path for zero cache benefit.

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-flight run for a PR ref when a new commit arrives; main
# pushes run to completion so every committed SHA keeps a full CI record.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # octocov posts the coverage comment
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up tools
        uses: jdx/mise-action@v4
        with:
          install_args: --locked
          cache_key: mise-${{ runner.os }}-${{ runner.arch }}-{{file_hash}}

      - name: Restore Go cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          # mise.lock carries the exact Go version; go.sum carries the module
          # graph. Either changing invalidates the compiled cache.
          key: ${{ runner.os }}-go-${{ hashFiles('mise.lock') }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('mise.lock') }}-

      - name: Check for generated code drift
        run: |
          mise run generate
          if ! git diff --exit-code -- ent/ gen/ graph/ internal/web/templates/ internal/web/static/tailwind.css internal/pdbcompat/allowlist_gen.go; then
            echo "::error::Generated code is out of date. Run 'mise run generate' and commit the changes."
            exit 1
          fi
          untracked="$(git ls-files --others --exclude-standard -- ent/ gen/ graph/ internal/web/templates/ internal/web/static/tailwind.css internal/pdbcompat/allowlist_gen.go)"
          if [[ -n "${untracked}" ]]; then
            printf '%s\n' "${untracked}"
            echo "::error::Generated code contains untracked files. Run 'mise run generate' and commit them."
            exit 1
          fi

      - name: Check go.mod/go.sum tidiness
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' and commit the changes."
            exit 1
          fi

      - name: Verify compilation
        run: mise run build

      - name: Run tests with race detector
        env:
          GOTESTSUM_FORMAT: github-actions
        run: mise run coverage

      - name: Post coverage comment
        uses: k1LoW/octocov-action@v1

      - name: Run golangci-lint
        run: mise run lint

      - name: Run govulncheck
        continue-on-error: true
        run: |
          if ! mise run vulncheck; then
            echo "::warning::govulncheck flagged at least one vulnerability — see step log for details"
            exit 1
          fi

      - name: Trim Go mod download zip cache before save
        if: always()
        run: find ~/go/pkg/mod/cache/download -name '*.zip' -delete

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Least privilege: the job only checks out and builds (push: false).
    # Without this it inherits the repository default token scope.
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build development image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
