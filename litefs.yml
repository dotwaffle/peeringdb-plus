# LiteFS configuration for PeeringDB Plus
# See: https://fly.io/docs/litefs/config/

exit-on-error: false

fuse:
  dir: "/litefs"

data:
  dir: "/var/lib/litefs"
  compress: true
  retention: "10m"

exec:
  - cmd: "/usr/local/bin/peeringdb-plus"

proxy:
  addr: ":8080"
  target: "localhost:8081"
  db: "peeringdb-plus.db"
  passthrough:
    - "/healthz"
    - "/readyz"
  primary-redirect-timeout: "5s"

lease:
  type: "consul"
  candidate: ${FLY_REGION == PRIMARY_REGION}
  promote: true
  advertise-url: "http://${HOSTNAME}.vm.${FLY_APP_NAME}.internal:20202"
  consul:
    url: "${FLY_CONSUL_URL}"
    key: "litefs/${FLY_APP_NAME}"
