message ListPocsRequest {
  int32 page_size = 1;
  string page_token = 2;

  // Filter fields -- all optional for presence detection.
  optional int64 net_id = 3;
  optional string role = 4;
  optional string name = 5;
  optional string status = 6;
  optional int64 id = 7;
  optional string visible = 8;
  optional string phone = 9;
  optional string email = 10;
  optional string url = 11;
}

message ListPocsResponse {
  repeated Poc pocs = 1;
  string next_page_token = 2;
}

message StreamPocsRequest {
  optional int64 net_id = 1;
  optional string role = 2;
  optional string name = 3;
  optional string status = 4;

  // Resume from this ID (exclusive). Only records with ID > since_id are returned.
  optional int64 since_id = 5;
  // Only records updated after this timestamp are returned.
  optional google.protobuf.Timestamp updated_since = 6;

  optional string visible = 7;
  optional string phone = 8;
  optional string email = 9;
  optional string url = 10;
}
