// CampusService provides read access to Campus records.
service CampusService {
  rpc GetCampus(GetCampusRequest) returns (GetCampusResponse);
  rpc ListCampuses(ListCampusesRequest) returns (ListCampusesResponse);

  // StreamCampuses streams all matching rows one message at a time.
  // Supports proto (application/proto) and JSON (application/json) via
  // Content-Type header. ConnectRPC handles format negotiation automatically.
  rpc StreamCampuses(StreamCampusesRequest) returns (stream Campus);
}

message GetCampusRequest {
  int64 id = 1;
}

message GetCampusResponse {
  Campus campus = 1;
}

message ListCampusesRequest {
  int32 page_size = 1;
  string page_token = 2;

  // Filter fields -- all optional for presence detection.
  optional string name = 3;
  optional string country = 4;
  optional string city = 5;
  optional string status = 6;
  optional int64 org_id = 7;
  optional int64 id = 8;
  optional string org_name = 9;
  optional string name_long = 10;
  optional string aka = 11;
  optional string website = 12;
  optional string notes = 13;
  optional string state = 14;
  optional string zipcode = 15;
  optional string logo = 16;
}

message ListCampusesResponse {
  repeated Campus campuses = 1;
  string next_page_token = 2;
}

message StreamCampusesRequest {
  optional string name = 1;
  optional string country = 2;
  optional string city = 3;
  optional string status = 4;
  optional int64 org_id = 5;

  // Resume from this ID (exclusive). Only records with ID > since_id are returned.
  optional int64 since_id = 6;
  // Only records updated after this timestamp are returned.
  optional google.protobuf.Timestamp updated_since = 7;

  optional string org_name = 8;
  optional string name_long = 9;
  optional string aka = 10;
  optional string website = 11;
  optional string notes = 12;
  optional string state = 13;
  optional string zipcode = 14;
  optional string logo = 15;
}

