syntax = "proto3";

package peeringdb.v1;

option go_package = "github.com/dotwaffle/peeringdb-plus/ent/proto/peeringdb/v1";

import "peeringdb/v1/v1.proto";

// CampusService provides read access to Campus records.
service CampusService {
  rpc GetCampus(GetCampusRequest) returns (GetCampusResponse);
  rpc ListCampuses(ListCampusesRequest) returns (ListCampusesResponse);
}

message GetCampusRequest {
  int64 id = 1;
}

message GetCampusResponse {
  Campus campus = 1;
}

message ListCampusesRequest {
  int32 page_size = 1;
  string page_token = 2;

  // Filter fields -- all optional for presence detection.
  optional string name = 3;
  optional string country = 4;
  optional string city = 5;
  optional string status = 6;
  optional int64 org_id = 7;
}

message ListCampusesResponse {
  repeated Campus campuses = 1;
  string next_page_token = 2;
}

